<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>

        .con {
            border: 4px double rgb(0, 242, 255);
            width: 300px;
            padding: 20px;
            margin-left: 100px;
            margin-right: 150px;
            margin-top: 200px;
            margin-bottom: 20px;
            text-align: center;
            font-size: large;
            font-family: sans-serif;
            border-radius: 20px;
            background-color: rgb(203, 243, 241);
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .nm{
            margin-right: 50px;
        }

    </style>
</head>

<body>

<div class="con">
    <h2>Login Form</h2>

    <div class="nm">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </div>

    <a>Forgot Password?</a>
</div>

</body>
</html>
